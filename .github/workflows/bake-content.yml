name: Bake Google Doc content

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch and bake content
        run: |
          python3 - <<'EOF'
          import urllib.request, json, re, sys

          SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyR6KR2mxJeuQW8thQU4y23IyPO5ObP8aBtK2_jpgvFqLXby6oB_-AZywNZdTFgZQ9BvA/exec'

          PAGES = [
              ('thinking.html',   '1sPvicRUoPuly0GOc4WpmXLUBxnESseu2Tf7Qpw-KdnE'),
              ('standup.html',    '1ceWu--vWErq0ON5yppRCbnf3V4Yk2q-A0QVuVRBPYgU'),
              ('catchphrase.html','1CAOdaeFoDDrK1I5098Nxn5OltsSNV-DdlqrAzdRQ56A'),
              ('calling.html',    '14C6sNIVrApObw9AqMadSBZKt3jRYJb--__D6EgdM6Fk'),
              ('worst-thing.html','1MR52ysUUT5agZxGb_K8BgVB3XkZvxQdsnTQ-QsMQuOo'),
          ]

          any_failed = False
          for filename, doc_id in PAGES:
              url = f'{SCRIPT_URL}?docId={doc_id}'
              try:
                  with urllib.request.urlopen(url, timeout=30) as r:
                      data = json.load(r)
              except Exception as e:
                  print(f'Fetch failed for {filename}: {e}', file=sys.stderr)
                  any_failed = True
                  continue

              html = data.get('html', '').strip()
              if not html:
                  print(f'No HTML for {filename}', file=sys.stderr)
                  any_failed = True
                  continue

              with open(filename, 'r') as f:
                  content = f.read()

              new_content = re.sub(
                  r'<!-- BAKED_START -->.*?<!-- BAKED_END -->',
                  f'<!-- BAKED_START -->{html}<!-- BAKED_END -->',
                  content,
                  flags=re.DOTALL
              )

              with open(filename, 'w') as f:
                  f.write(new_content)

              print(f'Baked {filename}.')

          if any_failed:
              sys.exit(1)
          EOF

      - name: Commit if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add thinking.html standup.html catchphrase.html calling.html worst-thing.html
          if git diff --cached --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "chore: bake Google Doc content"
            git push
          fi
