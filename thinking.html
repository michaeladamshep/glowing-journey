<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thinking Out Loud — Head Gone Wrong by Noise</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .thinking-page {
      max-width: 680px;
      margin: 0 auto;
      padding: 120px 2rem 100px;
    }

    .thinking-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #5f6368;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34a853;
      animation: pulse-dot 2s infinite;
    }

    .live-dot.disconnected { background: #ea4335; animation: none; }
    .live-dot.connecting   { background: #fbbc04; animation: pulse-dot 1s infinite; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    .open-doc-link {
      font-size: 12px;
      color: #1a73e8;
      text-decoration: none;
    }

    .open-doc-link:hover { text-decoration: underline; }

    #live-content {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 1rem;
      line-height: 1.7;
      color: #202124;
      min-height: 200px;
    }

    #live-content:empty::before {
      content: attr(data-placeholder);
      color: #bdc1c6;
    }

    .last-updated {
      font-size: 11px;
      color: #9aa0a6;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <header id="header">
    <div class="header-content">
      <a href="index.html"><h1>Head Gone Wrong by Noise</h1></a>
      <nav>
        <ul>
          <li>
            <a href="Solodyn.html" class="image-button">
              <img src="images/7397-removebg-preview.png" alt="Solodyn" style="width:100px;height:auto;">
            </a>
          </li>
          <li>
            <a href="applemusic.html" class="image-button">
              <img src="images/apple-music-icon.png" alt="applemusic" style="width:75px;height:auto;">
            </a>
          </li>
          <li>
            <a href="writing.html" class="image-button">
              <img src="images/comp2.png" alt="compnotebook" style="width:100px; height: auto;">
            </a>
          </li>
          <li>
            <a href="misc.html" class="image-button">
              <img src="images/MISC_Group_Logo_2023.png" alt="misclogo" style="width:100px;height:auto;">
            </a>
          </li>
          <li>
            <a href="contact.html" class="image-button">
              <img src="images/contact.png" alt="contact" style="width:100px; height: auto;">
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="thinking-page">
    <div class="thinking-meta">
      <div class="live-badge">
        <span class="live-dot connecting" id="live-dot"></span>
        <span id="live-status">Connecting…</span>
      </div>
      <a
        href="https://docs.google.com/document/d/1sPvicRUoPuly0GOc4WpmXLUBxnESseu2Tf7Qpw-KdnE/edit?usp=sharing"
        target="_blank"
        rel="noopener"
        class="open-doc-link"
      >Open in Docs to comment</a>
    </div>

    <div
      id="live-content"
      data-placeholder="Waiting for content from your Google Doc…"
    ></div>
    <p class="last-updated" id="last-updated"></p>
  </div>

  <footer></footer>
  <script src="footer.js"></script>
  <script>
    window.onscroll = function () {
      var header = document.getElementById('header');
      var images = document.querySelectorAll('.image-button img');
      var title  = document.querySelector('header h1');
      if (document.documentElement.scrollTop > 50) {
        header.classList.add('minimized');
        images.forEach(img => { img.style.width = '50px'; img.style.height = 'auto'; });
        title.style.marginRight = '10px';
        title.style.textAlign = 'right';
      } else {
        header.classList.remove('minimized');
        images.forEach(img => { img.style.width = '100px'; img.style.height = 'auto'; });
        title.style.marginRight = '0';
        title.style.textAlign = 'center';
      }
    };

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqrh_iHN3l7YNchR7bLTrOpNV11_tJJ1kXkfMwA6C4ShKlpSMcPtxkaeITT2-UeqkHFw/exec';
    const POLL_MS    = 2000;

    const dot       = document.getElementById('live-dot');
    const statusEl  = document.getElementById('live-status');
    const contentEl = document.getElementById('live-content');
    const lastUpdEl = document.getElementById('last-updated');

    let prevText  = '';
    let failCount = 0;

    function setStatus(state) {
      dot.className = 'live-dot ' + state;
      statusEl.textContent = { connecting: 'Connecting…', live: 'Live', disconnected: 'Disconnected — retrying…' }[state] || state;
    }

    async function fetchDoc() {
      try {
        const res  = await fetch(SCRIPT_URL + '?_t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        failCount = 0;
        setStatus('live');

        if (data.title) document.title = data.title + ' — Head Gone Wrong by Noise';

        const text = (data.text || '').trimEnd();
        if (text !== prevText) {
          prevText = text;
          contentEl.textContent = text;
        }

        if (data.ts) lastUpdEl.textContent = 'Last synced: ' + new Date(data.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      } catch (err) {
        failCount++;
        if (failCount >= 3) setStatus('disconnected');
      }
    }

    setStatus('connecting');
    fetchDoc();
    setInterval(fetchDoc, POLL_MS);
  </script>
</body>
</html>
