<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thinking Out Loud — Head Gone Wrong by Noise</title>
  <meta name="description" content="Thinking Out Loud — live notes and ideas from Michael Sheppard, synced directly from Google Docs.">
  <meta name="author" content="Michael Sheppard">
  <meta property="og:title" content="Thinking Out Loud — Head Gone Wrong by Noise">
  <meta property="og:description" content="Live notes and ideas from Michael Sheppard, synced directly from Google Docs.">
  <meta property="og:url" content="https://headgonebynoise.com/thinking.html">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://headgonebynoise.com/thinking.html">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header></header>
  <script src="header.js"></script>

  <div class="thinking-page">
    <div class="thinking-meta">
      <div class="live-badge">
        <span class="live-dot connecting" id="live-dot"></span>
        <span id="live-status">Connecting…</span>
      </div>
      <a
        href="https://docs.google.com/document/d/1sPvicRUoPuly0GOc4WpmXLUBxnESseu2Tf7Qpw-KdnE/edit?usp=sharing"
        target="_blank"
        rel="noopener"
        class="open-doc-link"
      >Open in Docs to comment</a>
    </div>

    <div
      id="live-content"
      data-placeholder="Waiting for content from your Google Doc…"
    ></div>
    <p class="last-updated" id="last-updated"></p>
  </div>


  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqrh_iHN3l7YNchR7bLTrOpNV11_tJJ1kXkfMwA6C4ShKlpSMcPtxkaeITT2-UeqkHFw/exec';
    const POLL_MS    = 2000;

    const dot       = document.getElementById('live-dot');
    const statusEl  = document.getElementById('live-status');
    const contentEl = document.getElementById('live-content');
    const lastUpdEl = document.getElementById('last-updated');

    let prevText  = '';
    let failCount = 0;

    function setStatus(state) {
      dot.className = 'live-dot ' + state;
      statusEl.textContent = { connecting: 'Connecting…', live: 'Live', disconnected: 'Disconnected — retrying…' }[state] || state;
    }

    async function fetchDoc() {
      try {
        const res  = await fetch(SCRIPT_URL + '?_t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        failCount = 0;
        setStatus('live');

        if (data.title) document.title = data.title + ' — Head Gone Wrong by Noise';

        const text = (data.text || '').trimEnd();
        if (text !== prevText) {
          prevText = text;
          contentEl.textContent = text;
        }

        if (data.ts) lastUpdEl.textContent = 'Last synced: ' + new Date(data.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      } catch (err) {
        failCount++;
        if (failCount >= 3) setStatus('disconnected');
      }
    }

    setStatus('connecting');
    fetchDoc();
    setInterval(fetchDoc, POLL_MS);
  </script>
</body>
</html>
