<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Worst Thing I've Ever Read — Head Gone Wrong by Noise</title>
  <meta name="description" content="The Worst Thing I've Ever Read by Michael Sheppard.">
  <meta name="author" content="Michael Sheppard">
  <meta property="og:title" content="The Worst Thing I've Ever Read — Head Gone Wrong by Noise">
  <meta property="og:description" content="The Worst Thing I've Ever Read by Michael Sheppard.">
  <meta property="og:url" content="https://headgonebynoise.com/worst-thing.html">
  <meta property="og:type" content="article">
  <link rel="canonical" href="https://headgonebynoise.com/worst-thing.html">
  <link rel="stylesheet" href="styles.css">
  <style>
    #read-progress { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: #1a1a2e; z-index: 1001; transition: width 0.1s linear; }
    #live-content h1 { font-size: 1.5rem; font-weight: 700; margin: 1.5rem 0 0.5rem; color: #1a1a2e; }
    #live-content h2 { font-size: 1.2rem; font-weight: 600; margin: 1.25rem 0 0.4rem; color: #1a1a2e; }
    #live-content h3 { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.3rem; color: #1a1a2e; }
    #live-content p  { margin: 0 0 0.9rem; }
    #live-content ul, #live-content ol { margin: 0 0 0.9rem; padding-left: 1.5rem; }
    #live-content li { margin-bottom: 0.25rem; }
    #live-content a  { color: #1a73e8; text-decoration: none; }
    #live-content a:hover { text-decoration: underline; }
    #live-content strong { font-weight: 600; }
    #live-content mark { border-radius: 2px; padding: 0 1px; }
    .comment-highlight-wrap { display: inline; cursor: pointer; }
    .comment-highlight { background: rgba(251,188,4,0.25); border-bottom: 2px solid rgba(251,188,4,0.6); cursor: pointer; border-radius: 2px; transition: background 0.15s; position: relative; }
    .comment-highlight:hover { background: rgba(251,188,4,0.4); }
    .comment-count { display: inline-flex; align-items: center; justify-content: center; background: #1a1a2e; color: #fff; font-size: 9px; font-weight: 700; border-radius: 8px; padding: 0 4px; min-width: 14px; height: 14px; vertical-align: super; margin-left: 2px; line-height: 1; }
    #comment-add-btn { position: fixed; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; z-index: 1000; display: none; letter-spacing: 0.04em; font-family: inherit; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    #comment-add-btn:hover { background: #2a2a4e; }
    #comment-popover { position: fixed; background: rgba(255,255,255,0.92); border: 1px solid rgba(255,255,255,0.8); border-radius: 10px; padding: 14px 16px; max-width: 300px; min-width: 180px; backdrop-filter: blur(20px) saturate(180%); z-index: 1000; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
    .popover-comment { margin-bottom: 10px; }
    .popover-comment:last-child { margin-bottom: 0; }
    .popover-author { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 3px; }
    .popover-text { font-size: 13px; color: #1a1a2e; line-height: 1.45; }
    .popover-time { font-size: 10px; color: #bbb; margin-top: 3px; }
    .popover-divider { border: none; border-top: 1px solid rgba(0,0,0,0.07); margin: 10px 0; }
    #comment-form-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1001; display: none; align-items: center; justify-content: center; }
    #comment-form-overlay.visible { display: flex; }
    .comment-form-card { background: rgba(255,255,255,0.92); border: 1px solid rgba(255,255,255,0.8); border-radius: 14px; padding: 24px; width: 420px; max-width: 90vw; backdrop-filter: blur(20px) saturate(180%); box-shadow: 0 16px 48px rgba(0,0,0,0.15); }
    .comment-form-card h3 { margin: 0 0 12px; font-size: 15px; color: #1a1a2e; font-weight: 600; }
    .comment-selected-preview { background: rgba(251,188,4,0.12); border-left: 3px solid rgba(251,188,4,0.7); padding: 8px 12px; margin-bottom: 16px; font-size: 13px; color: #666; border-radius: 0 4px 4px 0; max-height: 64px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
    .comment-form-card input, .comment-form-card textarea { width: 100%; background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 10px 12px; color: #1a1a2e; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; resize: none; }
    .comment-form-card input:focus, .comment-form-card textarea:focus { outline: none; border-color: rgba(26,26,46,0.35); }
    .comment-form-card input::placeholder, .comment-form-card textarea::placeholder { color: #bbb; }
    .comment-form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .btn-cancel { background: transparent; border: 1px solid rgba(0,0,0,0.12); color: #999; border-radius: 7px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-family: inherit; }
    .btn-cancel:hover { background: rgba(0,0,0,0.04); }
    .btn-submit { background: #1a1a2e; border: none; color: #fff; border-radius: 7px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
    .btn-submit:hover { background: #2a2a4e; }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header></header>
  <script src="header.js"></script>

  <div class="thinking-page">
    <div id="live-content" data-placeholder="Loading…"><!-- BAKED_START --><!-- BAKED_END --></div>
    <p class="last-updated" id="last-updated"></p>
  </div>

  <div id="read-progress"></div>
  <button id="comment-add-btn">Comment</button>
  <div id="comment-popover"></div>

  <div id="comment-form-overlay">
    <div class="comment-form-card">
      <h3>Add a comment</h3>
      <div class="comment-selected-preview" id="comment-selected-preview"></div>
      <input type="text" id="comment-author" placeholder="Your name (optional)">
      <textarea id="comment-text" placeholder="Your comment…" rows="4"></textarea>
      <div class="comment-form-actions">
        <button class="btn-cancel" id="comment-cancel">Cancel</button>
        <button class="btn-submit" id="comment-submit">Post</button>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyR6KR2mxJeuQW8thQU4y23IyPO5ObP8aBtK2_jpgvFqLXby6oB_-AZywNZdTFgZQ9BvA/exec';
    const DOC_ID    = '1MR52ysUUT5agZxGb_K8BgVB3XkZvxQdsnTQ-QsMQuOo';
    const PAGE_SLUG = 'worst-thing';
    const SUPABASE_URL = 'https://hhpxtwbmdjhbrynrwxjh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0FF74VRP57uQg5QIgenqIw_VLrlcJQD';

    const contentEl       = document.getElementById('live-content');
    const lastUpdEl       = document.getElementById('last-updated');
    const addBtn          = document.getElementById('comment-add-btn');
    const popover         = document.getElementById('comment-popover');
    const formOverlay     = document.getElementById('comment-form-overlay');
    const selectedPreview = document.getElementById('comment-selected-preview');
    const authorInput     = document.getElementById('comment-author');
    const commentInput    = document.getElementById('comment-text');
    const submitBtn       = document.getElementById('comment-submit');
    const cancelBtn       = document.getElementById('comment-cancel');

    let prevHtml = '';
    let prevText = '';
    let currentComments = [];
    let pendingAnchor = '';
    let popoverHideTimer = null;

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function fetchComments() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/comments?doc_id=eq.${PAGE_SLUG}&order=created_at.asc`, { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } });
        if (!res.ok) return;
        currentComments = await res.json();
        renderContent();
      } catch (e) {}
    }

    async function postComment(anchorText, commentText, authorName) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify({ doc_id: PAGE_SLUG, anchor_text: anchorText, comment_text: commentText, author_name: authorName || 'Anonymous' })
      });
      return res.ok;
    }

    function renderContent() {
      if (!prevHtml) return;
      contentEl.innerHTML = prevHtml;
      const walker = document.createTreeWalker(contentEl, NodeFilter.SHOW_TEXT);
      let t = '', n;
      while ((n = walker.nextNode())) t += n.textContent;
      prevText = t;
      applyCommentHighlights();
    }

    function applyCommentHighlights() {
      const anchors = new Map();
      for (const c of currentComments) {
        if (!anchors.has(c.anchor_text)) anchors.set(c.anchor_text, []);
        anchors.get(c.anchor_text).push(c);
      }
      if (!anchors.size) return;
      const allRanges = [];
      for (const [anchorText] of anchors) {
        let idx = 0;
        while (idx < prevText.length) {
          const pos = prevText.indexOf(anchorText, idx);
          if (pos === -1) break;
          allRanges.push({ start: pos, end: pos + anchorText.length, anchorText });
          idx = pos + anchorText.length;
        }
      }
      if (!allRanges.length) return;
      allRanges.sort((a, b) => b.start - a.start || (b.end - b.start) - (a.end - a.start));
      for (const r of allRanges) applyHighlight(r.anchorText, r.start, r.end);
      attachHighlightListeners();
    }

    function buildTextNodeMap() {
      const map = [];
      const walker = document.createTreeWalker(contentEl, NodeFilter.SHOW_TEXT);
      let pos = 0, node;
      while ((node = walker.nextNode())) { map.push({ node, start: pos, end: pos + node.textContent.length }); pos += node.textContent.length; }
      return map;
    }

    const BLOCK_TAGS = new Set(['UL','OL','DIV','BODY','HTML']);

    function applyHighlight(anchorText, start, end) {
      const map = buildTextNodeMap();
      const startEntry = map.find(e => start >= e.start && start < e.end);
      const endEntry   = map.find(e => end > e.start && end <= e.end);
      if (!startEntry || !endEntry) return;
      try {
        const range = document.createRange();
        range.setStart(startEntry.node, start - startEntry.start);
        range.setEnd(endEntry.node, end - endEntry.start);
        const ancestor = range.commonAncestorContainer;
        if (ancestor === contentEl || (ancestor.nodeType === Node.ELEMENT_NODE && BLOCK_TAGS.has(ancestor.tagName))) return;
        const mark = document.createElement('mark');
        mark.className = 'comment-highlight';
        mark.appendChild(range.extractContents());
        const wrap = document.createElement('span');
        wrap.className = 'comment-highlight-wrap';
        wrap.dataset.anchor = encodeURIComponent(anchorText);
        wrap.appendChild(mark);
        range.insertNode(wrap);
      } catch (e) {}
    }

    function attachHighlightListeners() {
      contentEl.querySelectorAll('.comment-highlight-wrap').forEach(el => {
        el.addEventListener('mouseenter', e => {
          e.stopPropagation();
          clearTimeout(popoverHideTimer);
          const allAnchors = [];
          let node = e.currentTarget;
          while (node && node !== contentEl) {
            if (node.classList && node.classList.contains('comment-highlight-wrap')) allAnchors.push(decodeURIComponent(node.dataset.anchor));
            node = node.parentElement;
          }
          const comments = currentComments.filter(c => allAnchors.includes(c.anchor_text));
          if (!comments.length) return;
          showPopover(e.currentTarget, comments);
        });
        el.addEventListener('mouseleave', () => { popoverHideTimer = setTimeout(() => { popover.style.display = 'none'; }, 200); });
      });
    }

    function showPopover(el, comments) {
      popover.innerHTML = comments.map((c, i) => `${i > 0 ? '<hr class="popover-divider">' : ''}<div class="popover-comment"><div class="popover-author">${escapeHtml(c.author_name)}</div><div class="popover-text">${escapeHtml(c.comment_text)}</div><div class="popover-time">${new Date(c.created_at).toLocaleDateString([],{month:'short',day:'numeric'})}</div></div>`).join('');
      popover.style.display = 'block';
      const rect = el.getBoundingClientRect();
      popover.style.top = (rect.bottom + 8) + 'px';
      popover.style.left = Math.max(16, Math.min(rect.left, window.innerWidth - popover.offsetWidth - 16)) + 'px';
      popover.onmouseenter = () => clearTimeout(popoverHideTimer);
      popover.onmouseleave = () => { popoverHideTimer = setTimeout(() => { popover.style.display = 'none'; }, 200); };
    }

    async function fetchDoc() {
      try {
        const res = await fetch(`${SCRIPT_URL}?docId=${DOC_ID}&_t=${Date.now()}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        if (data.title) document.title = data.title + ' — Head Gone Wrong by Noise';
        const html = (data.html || '').trim();
        if (html && html !== prevHtml) { prevHtml = html; renderContent(); }
        if (data.ts) lastUpdEl.textContent = 'Last synced: ' + new Date(data.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      } catch (e) {}
    }

    document.addEventListener('mouseup', e => {
      if (addBtn.contains(e.target)) return;
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || !contentEl.contains(sel.anchorNode)) { addBtn.style.display = 'none'; return; }
      const text = sel.toString().trim();
      if (!text) { addBtn.style.display = 'none'; return; }
      const range = sel.getRangeAt(0);
      const rect = range.getBoundingClientRect();
      addBtn.style.display = 'block';
      const btnW = addBtn.offsetWidth || 80;
      addBtn.style.top = (rect.top - 38) + 'px';
      addBtn.style.left = Math.min(window.innerWidth - btnW - 8, Math.max(8, rect.left + rect.width / 2 - btnW / 2)) + 'px';
      pendingAnchor = text;
    });

    addBtn.addEventListener('click', () => {
      addBtn.style.display = 'none';
      window.getSelection()?.removeAllRanges();
      selectedPreview.textContent = pendingAnchor;
      authorInput.value = '';
      commentInput.value = '';
      formOverlay.classList.add('visible');
      commentInput.focus();
    });

    cancelBtn.addEventListener('click', () => formOverlay.classList.remove('visible'));
    formOverlay.addEventListener('click', e => { if (e.target === formOverlay) formOverlay.classList.remove('visible'); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') formOverlay.classList.remove('visible');
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && formOverlay.classList.contains('visible')) { e.preventDefault(); submitBtn.click(); }
    });

    submitBtn.addEventListener('click', async () => {
      const text = commentInput.value.trim();
      if (!text) return;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Posting…';
      const ok = await postComment(pendingAnchor, text, authorInput.value.trim());
      if (ok) { formOverlay.classList.remove('visible'); await fetchComments(); }
      submitBtn.disabled = false;
      submitBtn.textContent = 'Post';
    });

    const progressBar = document.getElementById('read-progress');
    window.addEventListener('scroll', () => {
      const total = document.documentElement.scrollHeight - window.innerHeight;
      progressBar.style.width = (total > 0 ? (window.scrollY / total) * 100 : 0) + '%';
    });

    fetchDoc();
    fetchComments();
    setInterval(fetchComments, 30000);
  </script>
</body>
</html>
